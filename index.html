<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Tao of Effortless Drawing — coming soon." />
  <title>The Tao of Effortless Drawing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #faf7f2;
      color: #2c2c2c;
      font-family: Georgia, 'Times New Roman', serif;
      padding: 2rem;
      text-align: center;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: normal;
      letter-spacing: 0.02em;
      color: #1a1a1a;
      line-height: 1.2;
    }

    .divider {
      width: 3rem;
      height: 1px;
      background-color: #b5945a;
    }

    p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7a6a54;
    }

    footer {
      padding: 2rem;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.8rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <main>
    <h1>The Tao of Effortless Drawing</h1>
    <div class="divider" aria-hidden="true"></div>
    <p>Enrollment Opening Soon</p>
  </main>
  <footer>
    <p>&copy; <span id="year"></span> MJB Homestead Co. All rights reserved.</p>
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
